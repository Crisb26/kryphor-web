name = "kryphor-web"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"

[vars]
NEXTAUTH_URL = "https://kryphorlabs.com"

# Las demás variables (ANTHROPIC_API_KEY, NEXTAUTH_SECRET, ADMIN_EMAIL, ADMIN_PASSWORD)
# se configuran en el dashboard de Cloudflare > Workers & Pages > Settings > Variables
